name: Build ClickGo Borne

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Frontend (Expo web export) ──────────────────────────────────────
      - name: Install Borne frontend dependencies
        working-directory: born_dz
        run: npm install

      - name: Install Expo web dependencies
        working-directory: born_dz
        run: npx expo install react-dom react-native-web

      - name: Build Expo web frontend
        working-directory: born_dz
        run: npx expo export --platform web
        env:
          EXPO_NO_TELEMETRY: '1'

      # ── Electron desktop app ────────────────────────────────────────────
      - name: Install Electron app dependencies
        working-directory: my-desktop-app
        run: npm install

      - name: Build Electron installer (.exe)
        working-directory: my-desktop-app
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── GitHub Release ──────────────────────────────────────────────────
      - name: Create GitHub Release & upload exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ClickGo Borne v1.0.${{ github.run_number }}
          files: my-desktop-app/dist/ClickGo-Borne-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
