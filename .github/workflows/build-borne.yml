name: Build ClickGo Borne

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Synchroniser la version du package.json avec le tag ───────────
      - name: Set version from tag
        working-directory: my-desktop-app
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          VERSION="${VERSION#v}"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2)+'\n')"
          echo "Version set to: $VERSION"

      # ── Frontend (Expo web export) ──────────────────────────────────────
      - name: Install Borne frontend dependencies
        working-directory: born_dz
        run: npm install

      - name: Install Expo web dependencies
        working-directory: born_dz
        run: npm install --legacy-peer-deps react-dom react-native-web

      - name: Build Expo web frontend
        working-directory: born_dz
        run: npx expo export --platform web
        env:
          EXPO_NO_TELEMETRY: '1'

      # ── Electron desktop app ────────────────────────────────────────────
      - name: Install Electron app dependencies
        working-directory: my-desktop-app
        run: npm install

      - name: Build Electron installer (.exe)
        working-directory: my-desktop-app
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── GitHub Release ──────────────────────────────────────────────────
      - name: Create GitHub Release & upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: ClickGo Borne v${{ env.APP_VERSION }}
          files: |
            my-desktop-app/dist/ClickGo-Borne-Setup.exe
            my-desktop-app/dist/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
